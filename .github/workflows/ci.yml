name: CI

on:
  push:
  merge_group: 
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # uses lean standard action with all default input values
      - uses: leanprover/lean-action@v1
        with:
          lint: "false"
          test: "true"
